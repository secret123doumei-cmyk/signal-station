<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>秘密同盟 音響観測局</title>
<style>
:root{
  --bg:#001133; --panel:#000814; --accent:#6faeff; --btn:#002a66; --text:#cfe6ff;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:monospace;
  background:var(--bg);
  color:var(--text);
  -webkit-text-size-adjust:100%;
}
#wrap{max-width:420px;margin:0 auto;padding:12px;height:100vh;display:flex;flex-direction:column;}
.header{display:flex;flex-direction:column;}
#t1{font-size:15px}
#t2{font-size:18px;font-weight:600;margin-top:4px}
.toprow{display:flex;justify-content:space-between;align-items:center}
#langbtn{background:var(--btn);color:var(--text);border:1px solid var(--accent);padding:6px;width:44px;font-size:12px}
.linkbtn{background:var(--btn);color:white;border:1px solid var(--accent);padding:10px;width:100%;text-align:left;font-size:14px;margin-top:6px}
#bbstitle{margin:10px 0 6px 0;font-size:14px}
#bbs{flex:1;background:var(--panel);border:1px solid var(--accent);padding:8px;overflow:auto;font-size:13px}
#post{display:flex;gap:6px;margin-top:8px}
#nick{width:30%;padding:8px;background:#001a44;color:var(--text);border:1px solid var(--accent)}
#msg{flex:1;padding:8px;background:#001a44;color:var(--text);border:1px solid var(--accent)}
#postbtn{background:var(--btn);color:white;border:1px solid var(--accent);padding:8px 10px}

/* flicker防止：追加表示専用アニメ */
.bubble{display:block;margin:6px 0;padding:8px;border-radius:8px;opacity:0;transform:translateY(6px);animation:fadeIn .25s forwards}
@keyframes fadeIn{to{opacity:1;transform:none}}

.bubble.human{background:#0b2347}
.bubble.alien{background:#062012;color:#bfeedd}
.bubble.system{background:#071022;color:#ffb3b3}
.bubble.kiri{background:#002a66;color:#fff;font-weight:600}
.meta{font-size:11px;color:#9fe6ff;margin-bottom:4px}
</style>
</head>
<body>
<div id="wrap">

<div class="toprow">
<div class="header">
<div id="t1">秘密同盟</div>
<div id="t2">音響観測局</div>
</div>
<button id="langbtn">EN</button>
</div>

<div id="counter" class="small"></div>

<a href="https://secret123doumei-cmyk.github.io/Cyber-Pocket-Synth-Project-Himitsu/" target="_blank"><button class="linkbtn">シンセを開く</button></a>
<a href="https://secret123doumei-cmyk.github.io/observer/" target="_blank"><button class="linkbtn">観測局</button></a>
<a href="https://www.tiktok.com/@secret123doumei?_r=1&_t=ZS-94BXBnL96ie" target="_blank"><button class="linkbtn">記録映像(TikTok)</button></a>

<div id="bbstitle">掲示板</div>
<div id="bbs"></div>

<div id="post">
<input id="nick" placeholder="名前">
<input id="msg" placeholder="書き込む">
<button id="postbtn">書き込む</button>
</div>

</div>

<script>
const KEY="sa_bbs_v_final";
const MAX=300;
const bbs=document.getElementById("bbs");

/* 保存 */
function load(){return JSON.parse(localStorage.getItem(KEY)||"[]")}
function save(arr){localStorage.setItem(KEY,JSON.stringify(arr))}

/* 追加描画（←重要：再描画しない） */
function append(obj){
 let cls="human";
 if(obj.name==="system")cls="system";
 if(/^(k7|ghost|L-7|no-name)$/i.test(obj.name))cls="alien";
 if(obj.text.includes("観測記録"))cls="kiri";

 const d=document.createElement("div");
 d.className="bubble "+cls;
 d.innerHTML=`<div class="meta">[${obj.time}] ${obj.name}</div>${obj.text}`;
 bbs.appendChild(d);
 bbs.scrollTop=bbs.scrollHeight;
 while(bbs.children.length>MAX)bbs.removeChild(bbs.firstChild);
}

/* 初回ロードのみ全描画 */
function init(){
 const arr=load().slice().reverse();
 arr.forEach(append);
}
  function now(){
 const d=new Date();
 return String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0');
}

/* 投稿 */
document.getElementById("postbtn").onclick=function(){
 const name=document.getElementById("nick").value||"訪問者";
 const text=document.getElementById("msg").value;
 if(!text)return;

 const obj={name,text,time:now()};
 const arr=load();
 arr.unshift(obj);
 save(arr);

 append(obj);
 document.getElementById("msg").value="";
}

/* 会話生成（チカチカしないよう間隔固定） */
const NAMES=["k7","observer","ops","ghost","L-7","relay","night"];
const LINES=[
"ログ取りました",
"安定してます",
"異常なし",
"そのままでOK",
"コーヒー冷めた",
"今日は静か",
"記録だけ残します",
"受信中です",
"誰かいます？"
];

function auto(){
 const obj={
  name:NAMES[Math.floor(Math.random()*NAMES.length)],
  text:LINES[Math.floor(Math.random()*LINES.length)],
  time:now()
 };
 const arr=load();
 arr.unshift(obj);
 save(arr);
 append(obj);
}

setInterval(auto,4500+Math.random()*3500);

init();
</script>
</body>
</html>
